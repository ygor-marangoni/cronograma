<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f7">
  <title>Acadêmico - Agenda</title>
  <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Navegação lateral">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#3b5bdb"></rect>
              <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#3b5bdb" opacity="0.4"></rect>
              <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#3b5bdb" opacity="0.4"></rect>
              <rect x="11" y="11" width="7" height="7" rx="1.5" fill="#3b5bdb" opacity="0.7"></rect>
            </svg>
          </div>
          <span class="brand-name">Acadêmico</span>
        </div>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" type="button" aria-label="Fechar menu">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M13.5 4.5L4.5 13.5M4.5 4.5L13.5 13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>

      <div class="sidebar-new-btn-wrap">
        <button class="btn-new-task" id="btnNewTaskSidebar" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
          Nova tarefa
        </button>
      </div>

      <div class="sidebar-section sidebar-mobile-views">
        <span class="sidebar-section-label">Visualização</span>
        <div class="sidebar-view-toggle" role="group" aria-label="Modo de visualização">
          <button class="view-btn active" type="button" data-view="month">Mês</button>
          <button class="view-btn" type="button" data-view="week">Semana</button>
          <button class="view-btn" type="button" data-view="agenda">Agenda</button>
          <button class="view-btn" type="button" data-view="timeline">Linha</button>
        </div>
      </div>

      <div class="mini-calendar" aria-label="Mini calendário">
        <div class="mini-cal-header">
          <button class="mini-cal-nav" id="miniPrev" type="button" aria-label="Mês anterior">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <span class="mini-cal-title" id="miniCalTitle"></span>
          <button class="mini-cal-nav" id="miniNext" type="button" aria-label="Próximo mês">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
        <div class="mini-cal-grid" id="miniCalGrid" role="grid" aria-label="Dias do mês"></div>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-section-label">Tipos</span>
        <div class="type-filter-list" id="typeFilterList" role="group" aria-label="Filtrar por tipo">
          <button class="type-filter-item active" type="button" data-type="all"><span class="type-dot dot-all"></span>Todos</button>
          <button class="type-filter-item" type="button" data-type="prova"><span class="type-dot dot-prova"></span>Provas</button>
          <button class="type-filter-item" type="button" data-type="trabalho"><span class="type-dot dot-trabalho"></span>Trabalhos</button>
          <button class="type-filter-item" type="button" data-type="estudo"><span class="type-dot dot-estudo"></span>Estudos</button>
          <button class="type-filter-item" type="button" data-type="aula"><span class="type-dot dot-aula"></span>Aulas</button>
          <button class="type-filter-item" type="button" data-type="reuniao"><span class="type-dot dot-reuniao"></span>Reuniões</button>
          <button class="type-filter-item" type="button" data-type="pessoal"><span class="type-dot dot-pessoal"></span>Pessoal</button>
          <button class="type-filter-item" type="button" data-type="outro"><span class="type-dot dot-outro"></span>Outro</button>
        </div>
      </div>

      <div class="sidebar-section sidebar-upcoming">
        <span class="sidebar-section-label">Próximos prazos</span>
        <div class="upcoming-list" id="upcomingList"></div>
      </div>

      <div class="sidebar-data">
        <span class="sidebar-section-label">Arquivo</span>
        <div class="data-actions">
          <button class="data-btn" id="btnImportJson" type="button">Importar</button>
          <button class="data-btn primary" id="btnExportJson" type="button">Exportar</button>
          <input id="importJsonInput" type="file" accept=".json,application/json" hidden>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger-btn" id="hamburgerBtn" type="button" aria-label="Abrir menu" aria-expanded="false">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
            </svg>
          </button>
          <div class="nav-controls">
            <button class="nav-btn" id="btnPrev" type="button" aria-label="Período anterior">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10 3L6 8l4 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <button class="nav-btn today-btn" id="btnToday" type="button">Hoje</button>
            <button class="nav-btn" id="btnNext" type="button" aria-label="Próximo período">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 3l4 5-4 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
          <h1 class="topbar-title" id="topbarTitle"></h1>
        </div>

        <div class="topbar-right">
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.6"></circle>
              <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
            <input type="search" class="search-input" id="searchInput" placeholder="Buscar tarefas..." aria-label="Buscar tarefas">
          </div>
          <div class="view-toggle" role="group" aria-label="Modo de visualização">
            <button class="view-btn active" type="button" data-view="month">Mês</button>
            <button class="view-btn" type="button" data-view="week">Semana</button>
            <button class="view-btn" type="button" data-view="agenda">Agenda</button>
            <button class="view-btn" type="button" data-view="timeline">Linha</button>
          </div>
          <button class="theme-toggle-btn" id="themeToggleBtn" type="button" aria-label="Alternar tema">
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M12.9 11.1A6 6 0 0 1 6.9 2.2a6.5 6.5 0 1 0 8.9 8.9c-.9.3-1.9.3-2.9 0z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <svg class="icon-sun hidden" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <circle cx="9" cy="9" r="3.3" stroke="currentColor" stroke-width="1.7"></circle>
              <path d="M9 2.2v2M9 13.8v2M2.2 9h2M13.8 9h2M4.2 4.2l1.4 1.4M12.4 12.4l1.4 1.4M13.8 4.2l-1.4 1.4M5.6 12.4l-1.4 1.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
            </svg>
          </button>
          <button class="btn-new-task topbar-new-btn" id="btnNewTaskTop" type="button">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
              <path d="M7.5 1.5v12M1.5 7.5h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
            Nova
          </button>
        </div>
      </header>

      <section class="filters-bar" aria-label="Filtros">
        <div class="filters-inner">
          <span class="filters-label">Filtros:</span>
          <select class="filter-select" id="filterPriority" aria-label="Filtrar por prioridade">
            <option value="all">Prioridade</option>
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
          </select>
          <select class="filter-select" id="filterStatus" aria-label="Filtrar por status">
            <option value="all">Status</option>
            <option value="pendente">Pendente</option>
            <option value="concluida">Concluída</option>
          </select>
          <select class="filter-select" id="filterType" aria-label="Filtrar por tipo">
            <option value="all">Tipos</option>
            <option value="prova">Provas</option>
            <option value="trabalho">Trabalhos</option>
            <option value="estudo">Estudos</option>
            <option value="aula">Aulas</option>
            <option value="reuniao">Reuniões</option>
            <option value="pessoal">Pessoal</option>
            <option value="outro">Outro</option>
          </select>
          <button class="filter-clear-btn" id="filterClearBtn" type="button" aria-label="Limpar filtros">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M11 3L3 11M3 3l8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
            Limpar
          </button>
        </div>
      </section>

      <div class="content-area">
        <section class="calendar-panel">
          <div class="calendar-month" id="calendarMonth" role="grid" aria-label="Calendário mensal">
            <div class="month-weekdays" id="monthWeekdays" role="row"></div>
            <div class="month-grid" id="monthGrid"></div>
          </div>

          <div class="calendar-week hidden" id="calendarWeek" aria-label="Calendário semanal">
            <div class="week-header" id="weekHeader"></div>
            <div class="week-body" id="weekBody"></div>
          </div>

          <div class="calendar-agenda hidden" id="calendarAgenda" aria-label="Visualização agenda">
            <div class="agenda-list" id="agendaList"></div>
          </div>

          <div class="calendar-timeline hidden" id="calendarTimeline" aria-label="Linha do tempo horizontal">
            <div class="timeline-track" id="timelineTrack"></div>
          </div>
        </section>

        <aside class="day-panel" id="dayPanel" aria-label="Painel do dia selecionado">
          <div class="day-panel-header">
            <div class="day-panel-date" id="dayPanelDate"></div>
            <button class="day-panel-add" id="dayPanelAdd" type="button" aria-label="Adicionar tarefa neste dia">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M7 1.5v11M1.5 7h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </button>
          </div>
          <div class="day-summary" id="daySummary"></div>
          <div class="day-tasks-list" id="dayTasksList"></div>
          <div class="day-empty-state hidden" id="dayEmptyState">
            <div class="empty-icon" aria-hidden="true">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="#e5e7eb" stroke-width="2"></circle>
                <path d="M14 20h12M20 14v12" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </div>
            <p class="empty-message">Nenhuma tarefa<br>neste dia</p>
            <p class="empty-sub">Que tal aproveitar o dia?</p>
            <button class="btn-empty-add" id="btnEmptyAdd" type="button">+ Adicionar tarefa</button>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <button class="fab" id="fabBtn" type="button" aria-label="Nova tarefa">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
      <path d="M11 3v16M3 11h16" stroke="white" stroke-width="2.2" stroke-linecap="round"></path>
    </svg>
  </button>

  <div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nova tarefa</h2>
        <button class="modal-close" id="modalClose" type="button" aria-label="Fechar modal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M13.5 4.5L4.5 13.5M4.5 4.5l9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
          </svg>
        </button>
      </div>

      <form class="modal-form" id="taskForm" novalidate>
        <input type="hidden" id="taskId">

        <div class="form-group form-field form-full">
          <label class="form-label" for="taskTitle">Título <span class="required" aria-hidden="true">*</span></label>
          <input type="text" class="form-input" id="taskTitle" placeholder="Ex.: Prova de Algoritmos..." autocomplete="off" aria-describedby="titleError" required>
          <span class="form-error" id="titleError" role="alert"></span>
        </div>

        <div class="form-group form-field form-full">
          <label class="form-label" for="taskDescription">Descrição</label>
          <textarea class="form-textarea" id="taskDescription" placeholder="Detalhes adicionais..." rows="2"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group form-field">
            <label class="form-label" for="taskDate">Data <span class="required" aria-hidden="true">*</span></label>
            <input type="date" class="form-input" id="taskDate" aria-describedby="dateError" required>
            <span class="form-error" id="dateError" role="alert"></span>
          </div>
          <div class="form-group form-field">
            <label class="form-label" for="taskTime">Horário</label>
            <input type="time" class="form-input" id="taskTime">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-field">
            <label class="form-label" for="taskType">Tipo</label>
            <select class="form-select" id="taskType">
              <option value="prova">Prova</option>
              <option value="trabalho">Trabalho</option>
              <option value="estudo">Estudo</option>
              <option value="aula">Aula</option>
              <option value="reuniao">Reunião</option>
              <option value="pessoal">Pessoal</option>
              <option value="outro">Outro</option>
            </select>
          </div>
          <div class="form-group form-field">
            <label class="form-label" for="taskPriority">Prioridade</label>
            <select class="form-select" id="taskPriority" data-segmented="true">
              <option value="media">Média</option>
              <option value="alta">Alta</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <div class="form-actions-left">
            <button type="button" class="btn-delete hidden" id="btnDeleteTask">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 6h18M8 6V4.75A1.75 1.75 0 0 1 9.75 3h4.5A1.75 1.75 0 0 1 16 4.75V6M10 11v6M14 11v6M5.5 6l1 14h11l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              Excluir
            </button>
            <button type="button" class="btn-duplicate hidden" id="btnDuplicateTask">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"></rect>
                <path d="M3 10V3a1 1 0 011-1h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
              </svg>
              Duplicar
            </button>
          </div>
          <div class="form-actions-right">
            <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
            <button type="submit" class="btn-save" id="btnSave">Salvar tarefa</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="confirm-overlay hidden" id="confirmOverlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm-modal">
      <div class="confirm-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 6h18M8 6V4.75A1.75 1.75 0 0 1 9.75 3h4.5A1.75 1.75 0 0 1 16 4.75V6M10 11v6M14 11v6M5.5 6l1 14h11l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <div class="confirm-content">
        <h2 class="confirm-title" id="confirmTitle">Excluir tarefa?</h2>
        <p class="confirm-text" id="confirmText">Essa ação não pode ser desfeita.</p>
      </div>
      <div class="confirm-actions">
        <button type="button" class="btn-cancel" id="confirmCancel">Cancelar</button>
        <button type="button" class="btn-delete" id="confirmDelete">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js" defer></script>
</body>
</html>
